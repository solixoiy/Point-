<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARGE POINT | Recharge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 100px; }
        
        .profile-header {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('IMG_6519.jpeg');
            background-size: cover; background-position: center;
            height: 180px; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-bottom-left-radius: 3rem; border-bottom-right-radius: 3rem;
        }

        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .amount-box { 
            background: #f9fafb; border: 2px solid #f3f4f6; border-radius: 18px; 
            padding: 16px 2px; text-align: center; cursor: pointer; transition: 0.25s;
        }
        .amount-box.active { border-color: #f97316; background: #fff7ed; transform: scale(1.03); }
        .amount-box p { font-size: 12px; font-weight: 900; color: #111827; }
        
        .method-item { border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: 0.2s; background: white; }
        .method-item:last-child { border-bottom: none; }
        .method-active { background: #fff7ed !important; border-left: 4px solid #f97316; }
        
        @keyframes bounceIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in { animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-link { text-align: center; color: #9ca3af; font-size: 11px; text-decoration: none; font-weight: bold; }
        .nav-link.active { color: #f97316; }
    </style>
</head>
<body>

    <!-- En-tête -->
    <div class="profile-header text-center mb-8 shadow-md">
        <h1 class="text-2xl font-black uppercase tracking-tight">Recharger CDF</h1>
        <p class="text-[9px] font-bold opacity-90 uppercase tracking-[0.3em] mt-1 text-orange-400">Système de Dépôt Sécurisé</p>
    </div>

    <!-- Grille des montants -->
    <div class="px-6 mb-8">
        <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest text-left flex items-center gap-2">
            <i class="fa-solid fa-money-bill-wave text-orange-500"></i> 1. Sélectionnez le montant
        </h3>
        <div class="amount-grid">
            <div class="amount-box" onclick="setAmt(18000, this)"><p>18.000</p></div>
            <div class="amount-box" onclick="setAmt(35000, this)"><p>35.000</p></div>
            <div class="amount-box" onclick="setAmt(50000, this)"><p>50.000</p></div>
            <div class="amount-box" onclick="setAmt(75000, this)"><p>75.000</p></div>
            <div class="amount-box" onclick="setAmt(100000, this)"><p>100.000</p></div>
            <div class="amount-box" onclick="setAmt(150000, this)"><p>150.000</p></div>
            <div class="amount-box" onclick="setAmt(300000, this)"><p>300.000</p></div>
            <div class="amount-box" onclick="setAmt(500000, this)"><p>500.000</p></div>
            <div class="amount-box" onclick="setAmt(1000000, this)"><p>1.000.000</p></div>
        </div>
    </div>

    <!-- Choix du Réseau -->
    <div class="px-6 mb-6">
        <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest text-left flex items-center gap-2">
            <i class="fa-solid fa-network-wired text-orange-500"></i> 2. Choisissez le réseau
        </h3>
        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-gray-100">
            <div class="method-item p-5 flex items-center gap-4" onclick="setNet('Orange Money', '0853240089', 'junior Tshunza', this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg" class="w-7 h-7">
                <span class="text-xs font-black uppercase tracking-wider text-gray-700">Orange Money</span>
            </div>
            <div class="method-item p-5 flex items-center gap-4" onclick="setNet('Airtel Money', '0987686237','mokima moussa', this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d4/Airtel_logo.svg" class="w-7 h-7">
                <span class="text-xs font-black uppercase tracking-wider text-gray-700">Airtel Money</span>
            </div>
            <div class="method-item p-5 flex items-center gap-4" onclick="setNet('M-Pesa', '0813944647', 'NUMÉRO ANONYME', this)">
                <img src="https://i.ibb.co/Vvz8L1Y/mpesa.png" class="w-10 h-6 object-contain">
                <span class="text-xs font-black uppercase tracking-wider text-gray-700">M-Pesa (Vodacom)</span>
            </div>
        </div>
    </div>

    <!-- Boîte d'informations de transfert -->
    <div class="px-6 mb-8">
        <div id="boxInfo" class="hidden animate-bounce-in bg-white border border-orange-100 p-5 rounded-[2rem] shadow-sm">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-1">Envoyez l'argent au :</p>
                    <h2 id="dispNum" class="text-2xl font-black tracking-wider text-gray-900 italic">000 000 000</h2>
                </div>
                <div class="w-8 h-8 bg-orange-50 rounded-full flex items-center justify-center text-orange-500">
                    <i class="fa-solid fa-shield-halved text-sm"></i>
                </div>
            </div>
            <p id="dispName" class="text-[10px] font-black uppercase text-gray-400 tracking-tight">---</p>
        </div>
    </div>

    <!-- Bouton d'action -->
    <div class="px-6">
        <button onclick="submitPage1()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] shadow-md active:scale-95 transition-all">
            Continuer <i class="fa-solid fa-chevron-right ml-2 text-[9px]"></i>
        </button>
    </div>

    <!-- Barre de navigation inférieure -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house text-2xl mb-1"></i><br>Accueil</a>
        <a href="produit.html" class="nav-link"><i class="fa-solid fa-gas-pump text-2xl mb-1"></i><br>Produit</a>
        <a href="equipe.html" class="nav-link"><i class="fa-solid fa-users text-2xl mb-1"></i><br>Équipe</a>
        <a href="compte.html" class="nav-link active"><i class="fa-solid fa-user text-2xl mb-1"></i><br>Compte</a>
    </nav>

    <script>
        const session = JSON.parse(localStorage.getItem('sonny_session'));
        if(!session) window.location.href = "index.html";

        let selection = { amount: 0, method: '', receiverNumber: '', receiverName: '' };

        function setAmt(v, el) {
            selection.amount = v;
            document.querySelectorAll('.amount-box').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function setNet(m, n, name, el) {
            selection.method = m; 
            selection.receiverNumber = n; 
            selection.receiverName = name;
            
            document.querySelectorAll('.method-item').forEach(i => i.classList.remove('method-active'));
            el.classList.add('method-active');
            
            const box = document.getElementById('boxInfo');
            box.classList.remove('hidden');
            document.getElementById('dispNum').innerText = n;
            document.getElementById('dispName').innerText = "Titulaire : " + name;
            
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function submitPage1() {
            if(!selection.amount || !selection.method) {
                return alert("⚠️ Veuillez sélectionner un montant et un réseau de paiement.");
            }
            localStorage.setItem('temp_recharge', JSON.stringify(selection));
            window.location.href = "recharge_final.html";
        }
    </script>
</body>
</html>
