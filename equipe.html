<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARGE POINT | Mon Équipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #ffffff; min-height: 100vh; padding-bottom: 100px; }
        .glass-card { background: #ffffff; border-radius: 25px; border: 1px solid #f0f0f0; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); }
        .tab-active { background: #f97316 !important; color: #fff !important; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body class="pb-24 p-4">

    <div class="pt-6 pb-10 text-center">
        <h1 class="text-3xl font-black uppercase tracking-tight">Mon <span class="text-orange-500">Équipe</span></h1>
        <p class="text-[10px] tracking-[0.3em] uppercase font-bold text-gray-400 mt-1">Programme de Parrainage</p>
    </div>

    <div class="space-y-6">
        <!-- Section d'invitation avec votre lien exact -->
        <div class="glass-card p-6">
            <p class="text-[11px] font-black text-gray-400 uppercase mb-4 tracking-widest text-center">Invitez vos amis</p>
            <div class="bg-orange-50/50 p-4 rounded-2xl border border-dashed border-orange-200 mb-4 flex items-center justify-between">
                <div class="truncate mr-4 text-left">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Votre lien unique</p>
                    <span id="linkSpan" class="text-xs font-bold text-black italic">Chargement...</span>
                </div>
                <button onclick="copyInvite()" class="bg-orange-500 text-white text-[10px] font-black px-4 py-3 rounded-xl shadow-md active:scale-95 transition-all">COPIER</button>
            </div>
            <p class="text-center text-[10px] font-bold text-gray-500 uppercase tracking-widest">Code : <span id="codeSpan" class="text-orange-500 font-black">---</span></p>
        </div>

        <!-- Statistiques Équipe -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 text-center">
                <i class="fa-solid fa-coins text-orange-500 text-xl mb-2"></i>
                <p class="text-[9px] font-black text-gray-400 uppercase">Commissions</p>
                <p id="totalComm" class="text-xl font-black text-orange-500">0 CDF</p>
            </div>
            <div class="glass-card p-5 text-center">
                <i class="fa-solid fa-users text-gray-800 text-xl mb-2"></i>
                <p class="text-[9px] font-black text-gray-400 uppercase">Membres</p>
                <p id="totalTeam" class="text-xl font-black text-gray-900">0</p>
            </div>
        </div>

        <!-- Liste des Niveaux -->
        <div class="glass-card p-4">
            <div class="flex gap-2 mb-6 bg-gray-100 p-1.5 rounded-2xl">
                <button id="btn1" onclick="loadTeam(1)" class="tab-active flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all">LV1 (25%)</button>
                <button id="btn2" onclick="loadTeam(2)" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-gray-400">LV2 (2%)</button>
                <button id="btn3" onclick="loadTeam(3)" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-gray-400">LV3 (1%)</button>
            </div>
            <div id="membersList" class="space-y-1 min-h-[200px]"></div>
        </div>
    </div>

    <!-- Barre de navigation inférieure -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-house text-2xl mb-1"></i><span class="text-[10px] font-bold">Accueil</span></a>
        <a href="produit.html" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-gas-pump text-2xl mb-1"></i><span class="text-[10px] font-bold">Produit</span></a>
        <a href="equipe.html" class="flex flex-col items-center text-orange-500"><i class="fa-solid fa-users text-2xl mb-1"></i><span class="text-[10px] font-bold">Équipe</span></a>
        <a href="compte.html" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-user text-2xl mb-1"></i><span class="text-[10px] font-bold">Compte</span></a>
    </nav>

    <script>
        const session = JSON.parse(localStorage.getItem('sonny_session'));
        const dbURL = "https://sonyy-9b565-default-rtdb.firebaseio.com";

        if(!session) window.location.href = "index.html";

        // Initialisation avec votre nouveau lien exact de déploiement GitHub Pages
        const myInviteCode = session.telephone.replace("+243", "CP");
        document.getElementById('codeSpan').innerText = myInviteCode;
        document.getElementById('linkSpan').innerText = "https://solixoiy.github.io/Point-/register.html?ref=" + myInviteCode;

        function copyInvite() {
            navigator.clipboard.writeText(document.getElementById('linkSpan').innerText);
            alert("✅ Lien de parrainage copié !");
        }

        async function loadTeam(lvl) {
            [1, 2, 3].forEach(n => {
                document.getElementById('btn'+n).classList.toggle('tab-active', n === lvl);
                document.getElementById('btn'+n).classList.toggle('text-gray-400', n !== lvl);
            });

            const list = document.getElementById('membersList');
            list.innerHTML = `<p class="text-center py-10 text-[10px] font-bold text-gray-400 uppercase">Synchronisation...</p>`;

            try {
                const res = await fetch(`${dbURL}/utilisateurs.json`);
                const allUsers = await res.json();
                let members = [];
                let totalCommCalculated = 0;

                for (let id in allUsers) {
                    if (allUsers[id].parrain === myInviteCode) {
                        members.push(allUsers[id]);
                        totalCommCalculated += (allUsers[id].commissionsGenerees || 0);
                    }
                }

                if (members.length === 0) {
                    list.innerHTML = `<div class="flex flex-col items-center justify-center py-10 opacity-30">
                        <i class="fa-solid fa-user-group text-4xl mb-3 text-gray-400"></i>
                        <p class="text-[10px] font-black uppercase text-gray-500">Aucun membre au niveau ${lvl}</p>
                    </div>`;
                } else {
                    list.innerHTML = "";
                    members.forEach(m => {
                        const maskPhone = m.telephone.substring(0, 7) + "****";
                        list.innerHTML += `
                            <div class="member-item">
                                <div>
                                    <p class="text-xs font-black text-gray-800">${maskPhone}</p>
                                    <p class="text-[9px] text-gray-400 font-bold uppercase">${m.dateInscription || 'Membre Actif'}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs font-black text-green-600">+${(m.commissionsGenerees || 0).toLocaleString()} CDF</p>
                                    <p class="text-[8px] text-gray-400 font-black uppercase">Commission</p>
                                </div>
                            </div>
                        `;
                    });
                }

                document.getElementById('totalTeam').innerText = members.length;
                document.getElementById('totalComm').innerText = totalCommCalculated.toLocaleString() + " CDF";

            } catch (e) {
                console.error(e);
                list.innerHTML = `<p class="text-center py-10 text-[10px] font-bold text-red-500 uppercase">Erreur de chargement</p>`;
            }
        }

        window.onload = () => loadTeam(1);
    </script>
</body>
</html>
