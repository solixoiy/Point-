<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARGE POINT | Confirmation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .profile-header {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('IMG_6519.jpeg');
            background-size: cover; background-position: center;
            height: 200px; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-bottom-left-radius: 3rem; border-bottom-right-radius: 3rem;
        }

        .input-area { 
            background: #f9fafb; border: 1px solid #f3f4f6; border-radius: 1.5rem; 
            width: 100%; outline: none; transition: 0.25s; font-weight: 600;
        }
        .input-area:focus { border-color: #f97316; background: #ffffff; }

        .btn-gradient {
            background: #111827;
            transition: all 0.25s;
        }
        .btn-gradient:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <!-- Section En-tête -->
    <div class="profile-header text-center mb-8 shadow-md">
        <div class="mb-2 inline-block p-2.5 bg-white/10 rounded-full backdrop-blur-md border border-white/10">
            <i class="fa-solid fa-shield-halved text-xl text-orange-400"></i>
        </div>
        <h1 class="text-2xl font-black uppercase tracking-tight">Vérification</h1>
        <p class="text-[9px] font-bold opacity-90 uppercase tracking-[0.3em] mt-1 text-orange-400">Dernière étape de recharge</p>
    </div>

    <div class="px-6">
        <!-- Récapitulatif de la transaction -->
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 mb-6 flex justify-between items-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-5 text-gray-400"><i class="fa-solid fa-money-bill-transfer text-4xl"></i></div>
            <div class="text-left">
                <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Montant envoyé</p>
                <p id="resAmt" class="text-xl font-black text-gray-900 tracking-tighter">0 CDF</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Réseau utilisé</p>
                <p id="resNet" class="text-xs font-black text-orange-500 uppercase italic tracking-wider">---</p>
            </div>
        </div>

        <!-- Formulaire de validation -->
        <div class="space-y-5">
            <div>
                <label class="text-[9px] font-black uppercase text-gray-400 ml-2 mb-2 block tracking-widest">
                    <i class="fa-solid fa-envelope-open-text mr-1 text-orange-500"></i> Message de confirmation SMS
                </label>
                <textarea id="proofMessage" rows="5" placeholder="Collez ici l'intégralité du SMS reçu après votre transfert de fonds..." 
                class="input-area p-5 text-xs leading-relaxed shadow-inner"></textarea>
            </div>

            <div>
                <label class="text-[9px] font-black uppercase text-gray-400 ml-2 mb-2 block tracking-widest">
                    <i class="fa-solid fa-mobile-screen mr-1 text-orange-500"></i> Votre numéro expéditeur
                </label>
                <input type="tel" id="userPhone" placeholder="Ex: 08XXXXXXXX" 
                class="input-area p-4 text-xs font-bold shadow-inner">
            </div>

            <!-- Note d'information sécurisée -->
            <div class="bg-orange-50/60 border-l-4 border-orange-500 p-4 rounded-2xl mb-6">
                <div class="flex gap-3">
                    <i class="fa-solid fa-circle-info text-orange-500 mt-0.5 text-xs"></i>
                    <p class="text-[10px] text-orange-950 font-bold leading-relaxed">
                        Le système décode de manière automatique l'identifiant unique (ID) de transaction inclus dans le message. Tout usage de preuve falsifiée conduira à la restriction irréversible de votre compte.
                    </p>
                </div>
            </div>

            <!-- Bouton de validation -->
            <button onclick="validerRecharge()" id="btnSubmit" class="btn-gradient w-full text-white py-4 rounded-2xl font-black uppercase tracking-wider text-[11px] shadow-md">
                Confirmer le dépôt
            </button>
        </div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('sonny_session'));
        const data = JSON.parse(localStorage.getItem('temp_recharge'));
        const dbURL = "https://sonyy-9b565-default-rtdb.firebaseio.com";

        if(!data || !session) window.location.href = "recharge.html";

        document.getElementById('resAmt').innerText = data.amount.toLocaleString() + " CDF";
        document.getElementById('resNet').innerText = data.method;

        async function validerRecharge() {
            const proof = document.getElementById('proofMessage').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const btn = document.getElementById('btnSubmit');

            if(proof.length < 15 || phone.length < 9) {
                alert("❌ Erreur : Veuillez copier le message SMS officiel complet et saisir un numéro valide.");
                return;
            }

            btn.disabled = true;
            btn.className = "w-full bg-gray-400 text-white py-4 rounded-2xl font-black uppercase tracking-wider text-[11px] cursor-not-allowed text-center";
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Analyse cryptographique...';

            const rechargeRequest = {
                userId: session.firebaseId,
                telephoneCompte: session.telephone,
                numeroExpediteur: phone,
                montant: data.amount,
                reseau: data.method,
                messagePreuve: proof,
                date: new Date().toISOString(),
                status: "EN ATTENTE",
                vu: false
            };

            try {
                const response = await fetch(`${dbURL}/recharges.json`, {
                    method: 'POST',
                    body: JSON.stringify(rechargeRequest)
                });

                if(response.ok) {
                    alert("✅ Demande reçue avec succès ! Votre solde sera ajusté immédiatement après authentification de l'ID réseau (5 à 30 minutes).");
                    localStorage.removeItem('temp_recharge');
                    window.location.href = "compte.html";
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("❌ Connexion interrompue. Veuillez vérifier votre réseau internet et valider à nouveau.");
                btn.disabled = false;
                btn.className = "btn-gradient w-full text-white py-4 rounded-2xl font-black uppercase tracking-wider text-[11px] shadow-md";
                btn.innerHTML = "Réessayer la validation";
            }
        }
    </script>
</body>
</html>
