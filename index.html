<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARGE POINT | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #000 url('IMG_6517.jpeg') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Poppins', sans-serif;
        }
        .login-card {
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(249, 115, 22, 0.3); 
            width: 100%; 
            max-width: 420px;
            box-sizing: border-box;
        }
        .input-group { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white; 
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .input-group:focus-within {
            border-color: #f97316;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }
        input { 
            background: transparent; 
            border: none; 
            outline: none; 
            color: white; 
            width: 100%; 
            padding: 18px; 
            font-size: 16px; 
        }
        input::placeholder { color: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="p-4">

    <div class="login-card p-8 sm:p-10 rounded-[2.5rem] shadow-2xl">
        <!-- En-tête -->
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-black tracking-tight text-white uppercase">CHARGE POINT</h1>
            <p class="text-[11px] uppercase tracking-[0.4em] text-orange-500 mt-2 font-bold">Cinema Investment</p>
        </div>

        <!-- Formulaire -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="text-[11px] uppercase font-black text-white/70 ml-1 tracking-widest block mb-1">Numéro (+243)</label>
                <div class="input-group px-4 rounded-2xl">
                    <span class="text-white font-bold text-lg select-none">+243</span>
                    <input type="tel" id="loginTel" placeholder="812345678" required>
                </div>
            </div>

            <div>
                <label class="text-[11px] uppercase font-black text-white/70 ml-1 tracking-widest block mb-1">Mot de passe</label>
                <div class="input-group rounded-2xl">
                    <input type="password" id="loginPass" placeholder="••••••" required>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="bg-orange-500 text-white font-black w-full py-5 rounded-2xl text-[14px] uppercase mt-6 shadow-xl hover:bg-orange-600 active:scale-95 transition-all block text-center tracking-widest">
                Se Connecter
            </button>
        </form>

        <!-- Lien d'inscription -->
        <div class="mt-8 text-center text-white/50 text-sm">
            Nouveau partenaire ? <a href="register.html" class="text-orange-500 font-bold underline ml-1">Créer un compte</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = "+243" + document.getElementById('loginTel').value;
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = "VÉRIFICATION...";
            btn.disabled = true;

            // Récupération des utilisateurs depuis ta console Firebase (La clé Firebase reste intacte)
            fetch('https://sonyy-9b565-default-rtdb.firebaseio.com/utilisateurs.json')
            .then(response => response.json())
            .then(data => {
                let userFound = null;
                
                // On cherche si le numéro et le mot de passe correspondent
                for (let id in data) {
                    if (data[id].telephone === phone && data[id].motDePasse === pass) {
                        userFound = { ...data[id], firebaseId: id };
                        break;
                    }
                }

                if (userFound) {
                    // Stockage des infos de session
                    localStorage.setItem('sonny_session', JSON.stringify(userFound));
                    window.location.href = "dashboard.html";
                } else {
                    alert("❌ Numéro ou mot de passe incorrect.");
                    btn.innerText = "SE CONNECTER";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                alert("❌ Erreur de connexion au serveur.");
                btn.innerText = "SE CONNECTER";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
